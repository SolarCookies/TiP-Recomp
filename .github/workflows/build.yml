name: Build

on:
  push:
    branches: ["**"]
    tags:
      - "[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}${{ matrix.variant_suffix }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Plain builds: all 3 configs × 2 archs ────────────────────────
          - { platform: windows, arch: x64,   runner: windows-latest,  config: debug,           variant: plain, variant_suffix: "",        sdk_arch: win-amd64, preset_arch: win-amd64, build_type: Debug,          extra_cmake: "" }
          - { platform: windows, arch: x64,   runner: windows-latest,  config: release,         variant: plain, variant_suffix: "",        sdk_arch: win-amd64, preset_arch: win-amd64, build_type: Release,        extra_cmake: "" }
          - { platform: windows, arch: x64,   runner: windows-latest,  config: relwithdebinfo,  variant: plain, variant_suffix: "",        sdk_arch: win-amd64, preset_arch: win-amd64, build_type: RelWithDebInfo, extra_cmake: "" }
          - { platform: windows, arch: arm64, runner: windows-11-arm,  config: debug,           variant: plain, variant_suffix: "",        sdk_arch: win-arm64, preset_arch: win-arm64, build_type: Debug,          extra_cmake: "" }
          - { platform: windows, arch: arm64, runner: windows-11-arm,  config: release,         variant: plain, variant_suffix: "",        sdk_arch: win-arm64, preset_arch: win-arm64, build_type: Release,        extra_cmake: "" }
          - { platform: windows, arch: arm64, runner: windows-11-arm,  config: relwithdebinfo,  variant: plain, variant_suffix: "",        sdk_arch: win-arm64, preset_arch: win-arm64, build_type: RelWithDebInfo, extra_cmake: "" }

          # ── Tracy variants: RelWithDebInfo only ──────────────────────────
          - { platform: windows, arch: x64,   runner: windows-latest,  config: relwithdebinfo,  variant: tracy, variant_suffix: "-tracy",  sdk_arch: win-amd64, preset_arch: win-amd64, build_type: RelWithDebInfo, extra_cmake: "-DREXGLUE_ENABLE_TRACY=ON" }
          - { platform: windows, arch: arm64, runner: windows-11-arm,  config: relwithdebinfo,  variant: tracy, variant_suffix: "-tracy",  sdk_arch: win-arm64, preset_arch: win-arm64, build_type: RelWithDebInfo, extra_cmake: "-DREXGLUE_ENABLE_TRACY=ON" }

          # ── Development variants: define DEBUG_BUILD (RelWithDebInfo) ────
          - { platform: windows, arch: x64,   runner: windows-latest,  config: relwithdebinfo,  variant: development,  variant_suffix: "-development",  sdk_arch: win-amd64, preset_arch: win-amd64, build_type: RelWithDebInfo, extra_cmake: "-DRETIP_DEVELOPMENT_BUILD=ON" }
          - { platform: windows, arch: arm64, runner: windows-11-arm,  config: relwithdebinfo,  variant: development,  variant_suffix: "-development",  sdk_arch: win-arm64, preset_arch: win-arm64, build_type: RelWithDebInfo, extra_cmake: "-DRETIP_DEVELOPMENT_BUILD=ON" }

    env:
      SDK_CONFIGURE_PRESET: ${{ matrix.sdk_arch }}
      SDK_BUILD_PRESET: ${{ matrix.sdk_arch }}-${{ matrix.config }}
      SDK_INSTALL_DIR: rexglue-sdk/out/install/${{ matrix.sdk_arch }}
      RETIP_PRESET: ${{ matrix.preset_arch }}-${{ matrix.config }}
      RETIP_BINARY: out/build/${{ matrix.preset_arch }}-${{ matrix.config }}/retip.exe
      ARTIFACT_NAME: retip-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.config }}${{ matrix.variant_suffix }}.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── Windows x64 ────────────────────────────────────────────────────────
      - name: Install Ninja (Windows)
        uses: seanmiddleditch/gha-setup-ninja@v6

      # ── Build rexglue SDK from SolarCookies fork (VivaPinata branch) ──────
      - name: Clone rexglue SDK fork
        run: git clone --recursive --branch VivaPinata https://github.com/SolarCookies/rexglue-sdk.git rexglue-sdk

      - name: Configure rexglue SDK
        working-directory: rexglue-sdk
        run: cmake --preset ${{ env.SDK_CONFIGURE_PRESET }} --fresh ${{ matrix.extra_cmake }}

      - name: Build & install rexglue SDK
        working-directory: rexglue-sdk
        run: cmake --build --preset ${{ env.SDK_BUILD_PRESET }} --target install

      - name: Add rexglue to PATH
        run: echo "${{ github.workspace }}\${{ env.SDK_INSTALL_DIR }}\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      # ── Download game executable for codegen ───────────────────────────────
      - name: Download default.xex
        run: |
          New-Item -ItemType Directory -Force -Path assets | Out-Null
          Invoke-WebRequest -Uri "https://goopie.xyz/default.xex" -OutFile "assets/default.xex"
        shell: pwsh

      # ── rexglue migrate (writes generated/ + .bak files) ──────────────────
      - name: rexglue migrate
        run: rexglue migrate --app_root .
        shell: pwsh

      # ── Configure retip ────────────────────────────────────────────────────
      - name: Configure CMake
        run: cmake --preset ${{ env.RETIP_PRESET }} -DCMAKE_PREFIX_PATH="${{ github.workspace }}/${{ env.SDK_INSTALL_DIR }}" ${{ matrix.extra_cmake }}
        shell: bash

      # ── Run codegen ───────────────────────────────────────────────────────
      - name: Run codegen
        run: cmake --build --preset ${{ env.RETIP_PRESET }} --target retip_codegen

      # ── Restore original files clobbered by `rexglue migrate` ─────────────
      - name: Restore original sources
        run: |
          if (Test-Path CMakeLists.txt.bak) { Copy-Item -Force CMakeLists.txt.bak CMakeLists.txt }
          if (Test-Path src\main.cpp.bak) { Copy-Item -Force src\main.cpp.bak src\main.cpp }
        shell: pwsh

      # ── Reconfigure with restored CMakeLists.txt ──────────────────────────
      - name: Reconfigure CMake
        run: cmake --preset ${{ env.RETIP_PRESET }} -DCMAKE_PREFIX_PATH="${{ github.workspace }}/${{ env.SDK_INSTALL_DIR }}" ${{ matrix.extra_cmake }}
        shell: bash

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build --preset ${{ env.RETIP_PRESET }}

      - name: Rename binary
        run: cp "${{ env.RETIP_BINARY }}" "${{ env.ARTIFACT_NAME }}"
        shell: bash

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}

  release:
    name: Create Release
    needs: build
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          shopt -s globstar
          gh release create "${{ github.ref_name }}" \
            --title "ReTiP ${{ github.ref_name }}" \
            --notes $'# Download and install through the https://goopie.xyz Launcher\n\n## Changelog Post:\nhttps://www.patreon.com/SolarCookies/' \
            artifacts/**/* \
            retip.toml
