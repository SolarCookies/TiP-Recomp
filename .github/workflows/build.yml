name: Build

on:
  push:
    branches: ["**"]
    tags:
      - "[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x64
            runner: windows-latest
            preset: win-amd64-relwithdebinfo
            sdk_configure_preset: win-amd64
            sdk_build_preset: win-amd64-relwithdebinfo
            sdk_install_dir: rexglue-sdk/out/install/win-amd64
            binary: out\build\win-amd64-relwithdebinfo\retip.exe
            artifact: retip-windows-x64.exe

          - platform: windows
            arch: arm64
            runner: windows-11-arm
            preset: win-arm64-relwithdebinfo
            sdk_configure_preset: win-arm64
            sdk_build_preset: win-arm64-relwithdebinfo
            sdk_install_dir: rexglue-sdk/out/install/win-arm64
            binary: out\build\win-arm64-relwithdebinfo\retip.exe
            artifact: retip-windows-arm64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── Windows x64 ────────────────────────────────────────────────────────
      - name: Install Ninja (Windows)
        uses: seanmiddleditch/gha-setup-ninja@v6

      # ── Build rexglue SDK from SolarCookies fork (VivaPinata branch) ──────
      - name: Clone rexglue SDK fork
        run: git clone --recursive --branch VivaPinata https://github.com/SolarCookies/rexglue-sdk.git rexglue-sdk

      - name: Configure rexglue SDK
        working-directory: rexglue-sdk
        run: cmake --preset ${{ matrix.sdk_configure_preset }} --fresh

      - name: Build & install rexglue SDK
        working-directory: rexglue-sdk
        run: cmake --build --preset ${{ matrix.sdk_build_preset }} --target install

      - name: Add rexglue to PATH
        run: echo "${{ github.workspace }}\${{ matrix.sdk_install_dir }}\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      # ── Download game executable for codegen ───────────────────────────────
      - name: Download default.xex
        run: Invoke-WebRequest -Uri "http://64.225.52.239/default.xex" -OutFile "assets/default.xex"
        shell: pwsh

      # ── rexglue migrate (writes generated/ + .bak files) ──────────────────
      - name: rexglue migrate
        run: rexglue migrate --app_root .
        shell: pwsh

      # ── Configure retip ────────────────────────────────────────────────────
      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }} -DCMAKE_PREFIX_PATH="${{ github.workspace }}/${{ matrix.sdk_install_dir }}"
        shell: bash

      # ── Run codegen ───────────────────────────────────────────────────────
      - name: Run codegen
        run: cmake --build --preset ${{ matrix.preset }} --target retip_codegen

      # ── Restore original files clobbered by `rexglue migrate` ─────────────
      - name: Restore original sources
        run: |
          if (Test-Path CMakeLists.txt.bak) { Copy-Item -Force CMakeLists.txt.bak CMakeLists.txt }
          if (Test-Path src\main.cpp.bak) { Copy-Item -Force src\main.cpp.bak src\main.cpp }
        shell: pwsh

      # ── Reconfigure with restored CMakeLists.txt ──────────────────────────
      - name: Reconfigure CMake
        run: cmake --preset ${{ matrix.preset }} -DCMAKE_PREFIX_PATH="${{ github.workspace }}/${{ matrix.sdk_install_dir }}"
        shell: bash

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Rename binary
        run: cp "${{ matrix.binary }}" "${{ matrix.artifact }}"
        shell: bash

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          shopt -s globstar
          gh release create "${{ github.ref_name }}" \
            --title "ReTiP ${{ github.ref_name }}" \
            --notes $'# Download and install through the https://goopie.xyz Launcher\n\n## Changelog Post:\nhttps://www.patreon.com/SolarCookies/' \
            artifacts/**/* \
            retip.toml
